<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Auto Filler</title>
    <style>
      body {
        box-sizing: border-box;
        width: 320px;
        margin: 0;
        padding: 20px;
        color: #172033;
        font-family: system-ui, sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        margin-top: 8px;
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        background: #2952cc;
        color: white;
        cursor: pointer;
        font: inherit;
      }

      button:disabled {
        background: #a8b0c2;
        cursor: not-allowed;
      }

      .secondary {
        background: #edf1fb;
        color: #172033;
      }

      #status {
        min-height: 42px;
        color: #536078;
      }

      /* Backend Status */
      #backend-status {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        background: #edf1fb;
        color: #33456f;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      #backend-status[data-status="online"] {
        background: #e7f7ee;
        color: #17633a;
      }

      #backend-status[data-status="offline"] {
        background: #ffeded;
        color: #922323;
      }

      #backend-status[data-status="checking"] {
        background: #fff5d9;
        color: #815b00;
      }

      /* Loading */
      #loading {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 8px;
        background: #edf1fb;
        color: #33456f;
        font-size: 14px;
      }

      #loading.visible {
        display: flex;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #2952cc33;
        border-top-color: #2952cc;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Result Summary */
      #result {
        display: none;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 8px;
        background: #e7f7ee;
        color: #17633a;
        font-size: 14px;
      }

      #result.visible {
        display: block;
      }

      #result .stat {
        display: flex;
        justify-content: space-between;
        padding: 2px 0;
      }

      #result .stat .label {
        font-weight: 600;
      }

      #result.error {
        background: #ffeded;
        color: #922323;
      }

      #manual-mapping-section {
        display: none;
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid #dce1ec;
        border-radius: 10px;
        background: #fbfcff;
      }

      #manual-mapping-section.visible {
        display: block;
      }

      #manual-mapping-list {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .mapping-item {
        padding: 10px;
        border: 1px solid #dce1ec;
        border-radius: 8px;
        background: white;
      }

      .mapping-item[data-skipped="true"] {
        opacity: 0.7;
        background: #f5f6fb;
      }

      .mapping-item p {
        margin-bottom: 8px;
      }

      .mapping-item select {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #bfc7d8;
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      .mapping-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
      }

      .mapping-preview {
        color: #536078;
        font-size: 12px;
      }

      .mapping-skip {
        margin-top: 0;
        padding: 8px 10px;
        border-radius: 6px;
        background: #edf1fb;
        color: #172033;
        width: auto;
      }

      .manual-mapping-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .manual-mapping-actions button {
        margin-top: 0;
      }

      /* Auto Submit Toggle */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #dce1ec;
        font-size: 13px;
        color: #536078;
      }

      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: #a8b0c2;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle-slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 2px;
        top: 2px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .toggle-switch input:checked + .toggle-slider {
        background: #2952cc;
      }

      .toggle-switch input:checked + .toggle-slider::before {
        transform: translateX(16px);
      }
    </style>
  </head>
  <body>
    <h1>Form Auto Filler</h1>
    <span id="backend-status" data-status="checking">Checking...</span>
    <p id="status">Checking this page...</p>

    <div id="loading">
      <div class="spinner"></div>
      <span>กำลังกรอกข้อมูล...</span>
    </div>

    <div id="result">
      <div id="result-message"></div>
      <div class="stat">
        <span class="label">กรอกสำเร็จ:</span>
        <span id="filled-count">0</span>
      </div>
      <div class="stat">
        <span class="label">ข้าม:</span>
        <span id="skipped-count">0</span>
      </div>
      <div class="stat">
        <span class="label">ล้มเหลว:</span>
        <span id="failed-count">0</span>
      </div>
    </div>

    <section id="manual-mapping-section" aria-live="polite">
      <strong>เลือกข้อมูลสำหรับคำถามที่ระบบยังจับคู่ไม่ได้</strong>
      <p id="manual-mapping-help">เลือก field ที่ตรง แล้วกด Save & Fill</p>
      <div id="manual-mapping-list"></div>
      <div class="manual-mapping-actions">
        <button id="save-mappings" type="button">Save & Fill</button>
        <button id="cancel-mappings" class="secondary" type="button">Cancel</button>
      </div>
    </section>

    <button id="autofill" type="button" disabled>Autofill</button>
    <button id="options" class="secondary" type="button">Manage Profile</button>

    <div class="toggle-row">
      <span>Auto Submit (experimental)</span>
      <label class="toggle-switch">
        <input type="checkbox" id="auto-submit-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <script src="mapping-store.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
