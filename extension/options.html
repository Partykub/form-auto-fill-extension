<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Auto Filler Settings</title>
    <style>
      :root {
        color: #172033;
        font-family: system-ui, sans-serif;
        background: #f6f7fb;
      }

      body {
        max-width: 920px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      .panel {
        margin-bottom: 24px;
        padding: 24px;
        border: 1px solid #dce1ec;
        border-radius: 14px;
        background: white;
        box-shadow: 0 6px 24px rgb(25 39 75 / 6%);
      }

      .panel-header,
      .actions,
      .sync-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .field-card {
        margin-top: 16px;
        padding: 18px;
        border: 1px solid #dce1ec;
        border-radius: 10px;
        background: #fbfcff;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 650;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #bfc7d8;
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      input:focus {
        border-color: #2952cc;
        outline: 2px solid rgb(41 82 204 / 15%);
      }

      button {
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        background: #2952cc;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 650;
      }

      button.secondary {
        background: #e9eefc;
        color: #20366f;
      }

      button.danger {
        background: #fff0f0;
        color: #a32121;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .error {
        min-height: 18px;
        margin-top: 5px;
        color: #b42318;
        font-size: 13px;
      }

      .muted {
        color: #63708a;
      }

      .badge {
        padding: 5px 10px;
        border-radius: 999px;
        background: #edf1fb;
        color: #33456f;
        font-size: 13px;
        font-weight: 700;
      }

      .badge[data-status="synced"] {
        background: #e7f7ee;
        color: #17633a;
      }

      .badge[data-status="pending"] {
        background: #fff5d9;
        color: #815b00;
      }

      .badge[data-status="conflict"],
      .badge[data-status="error"] {
        background: #ffeded;
        color: #922323;
      }

      #conflict-panel {
        border-color: #e3a5a5;
      }

      .profile-preview {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .profile-preview section {
        padding: 14px;
        border-radius: 8px;
        background: #f4f6fb;
      }

      .profile-preview ul {
        margin-bottom: 0;
        padding-left: 20px;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 680px) {
        .field-grid,
        .profile-preview {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Form Auto Filler</h1>
    <p class="muted">จัดการข้อมูล Profile และการเชื่อมต่อ Backend</p>

    <section class="panel">
      <h2>Backend Settings</h2>
      <form id="settings-form">
        <label for="backend-url">Backend URL</label>
        <input id="backend-url" name="backendUrl" type="url" required>
        <div class="actions">
          <button type="submit">Save Settings</button>
          <span id="settings-status" class="muted" role="status"></span>
        </div>
      </form>
    </section>

    <section id="conflict-panel" class="panel" hidden>
      <h2>Profile Conflict</h2>
      <p>Profile ใน Chrome และ Backend ถูกแก้ไขแยกกัน กรุณาเลือกข้อมูลที่ต้องการเก็บ</p>
      <div class="profile-preview">
        <section>
          <h3>Local Profile</h3>
          <div id="local-preview"></div>
        </section>
        <section>
          <h3>Server Profile</h3>
          <div id="server-preview"></div>
        </section>
      </div>
      <div class="actions">
        <button id="use-local" type="button">Use Local</button>
        <button id="use-server" class="secondary" type="button">Use Server</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Profile</h2>
          <p class="muted">Default fields ลบไม่ได้ แต่สามารถปล่อยคำตอบว่างได้</p>
        </div>
        <div class="sync-row">
          <span id="sync-status" class="badge" data-status="pending">Loading</span>
          <button id="retry-sync" class="secondary" type="button">Retry Sync</button>
        </div>
      </div>

      <form id="profile-form" novalidate>
        <div id="profile-error" class="error" role="alert"></div>
        <div id="fields"></div>
        <div class="actions">
          <button id="add-field" class="secondary" type="button">Add Custom Field</button>
          <button id="save-profile" type="submit">Save Profile</button>
        </div>
      </form>
    </section>

    <script type="module" src="options.js"></script>
  </body>
</html>
